<dl class="complex-raw">
  <ng-container *ngFor="let field of caseField | ccdReadFieldsFilter:false :undefined :true :topLevelFormGroup :id()">
    <ng-container ccdLabelSubstitutor [caseField]="field" [formGroup]="topLevelFormGroup" [contextFields]="caseFields">
      <dt [hidden]="field.hidden || field.field_type.type === 'Label'"><span class="text-16">{{isTranslatable(field) ? (field.label | rpxTranslate) : field.label}}</span></dt>
      <dd [hidden]="field.hidden">
        <ccd-field-read [caseField]="field" [context]="context" [valueOrigin]="valueOrigin" [caseFields]="caseFields" [topLevelFormGroup]="topLevelFormGroup" [idPrefix]="idPrefix"></ccd-field-read>
      </dd>
    </ng-container>
  </ng-container>
</dl>
